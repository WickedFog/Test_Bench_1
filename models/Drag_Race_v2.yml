# LOGICAL SWITCHES
#   L1 â€“ Armed condition: throttle>5% AND transbrake held (SC1)
#          FIX: was andsw:SC2 â€” SC has no position 2 (momentary)
#   L2 â€“ STICKY: latches when L1 fires; active for 10s; gated by L1
#   L3 â€“ STICKY: 10s delay then 10s duration; gated by L1
#   L4 â€“ STICKY: arm latch; sets on L2; CLEARS when SA returns to Burnout (SA0)
#          FIX: was def:SD2,SD2 â€” SD is RESERVED, SD2 does not exist
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
logicalSw:
  0:
    func: FUNC_VPOS
    def: I1,5
    delay: 0
    duration: 0
    andsw: SC1
    lsPersist: 0
    lsState: 0
  1:
    func: FUNC_STICKY
    def: L1,NONE
    delay: 0
    duration: 10
    andsw: L1
    lsPersist: 0
    lsState: 0
  2:
    func: FUNC_STICKY
    def: L1,NONE
    delay: 10
    duration: 10
    andsw: L1
    lsPersist: 0
    lsState: 0
  3:
    func: FUNC_STICKY
    def: L2,SA0
    delay: 0
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
