# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# CHANNEL MAP (MT12 hardware)
#   CH1 (ST)  â€“ Steering
#   CH2 (TH)  â€“ Throttle / ESC
#   CH3 (SA)  â€“ Drive Mode selector (SA=ROLE_DRIVE_MODE)
#   CH5 (SC)  â€“ Transbrake (momentary hold=engaged, release=launch)
#   CH6 (SD)  â€“ RESERVED â€” factory throttle lockout, never assigned
#   CH7 (S1)  â€“ Throttle cap / power level knob
#   CH8 (S2)  â€“ Ramp rate / timing knob
#
# SA POSITIONS (Drive Mode)
#   SA0 (up)  = Burnout  â†’ FM0
#   SA1 (mid) = Stage    â†’ FM1
#   SA2 (dn)  = Race     â†’ FM2
#
# LAUNCH SEQUENCE
#   1. SA to Burnout (SA0) â€” L4 red, throttle locked
#   2. Rev motor; SA to Stage (SA1)
#   3. Hold SC (transbrake) + throttle up â†’ L1 fires â†’ L2/L3/L4 arm
#   4. SA to Race (SA2) â€” L4 green, throttle override lifts
#   5. Release SC â†’ launch
#   6. SA back to Burnout (SA0) â†’ L4 resets â†’ red
#
# THROTTLE LOGIC (override / caps by flight mode)
#   !L4 active â†’ CH2 forced to 0 (customFn OVERRIDE)
#   FM0 (Burnout), L2 â†’ cap 25%, speed ramp 10
#   FM0 (Burnout), L3 â†’ cap 75%, speed ramp 10
#   FM1 (Stage),   L3 â†’ cap 70%
#   FM2 (Race),    L3 â†’ cap 15% (staging creep before release)
#
# GV INTEGRATION (wired by Python generator)
#   GV1 = burnout cap    GV2 = staging cap
#   GV3-5 = stage 1/2/3 power levels   GV6 = ramp time
#
# LED
#   Red  = !L4 (disarmed)
#   Green = L4 (armed / launch active)
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
