    carryTrim: 0
    mltpx: REPL
    mixWarn: 0
    flightModes: 000000000
    offset: 0
    name: DigOn
  # â”€â”€ CH6 (SD): RESERVED â€” intentionally omitted â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # â”€â”€ CH7: Rear Steering (4WS) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Base: counter-steer (inverted, 75%)
  - destCh: 6
