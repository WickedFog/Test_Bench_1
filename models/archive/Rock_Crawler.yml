# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# CHANNEL MAP (MT12 hardware)
#   CH1 (ST)  â€“ Front Steering servo
#   CH2 (TH)  â€“ Throttle / ESC
#   CH3 (SA)  â€“ Winch ESC  (SA0-up=reel-in | SA1-mid=stop | SA2-dn=reel-out)
#   CH4 (SB)  â€“ 2-Speed servo (hold SB = high gear; release = low gear)
#   CH5 (SC)  â€“ Dig unit servo/relay (hold SC = dig engaged)
#   CH6 (SD)  â€“ RESERVED â€” never assigned
#   CH7 (S1)  â€“ Rear Steering servo  (S1 knob scales rear travel via expoData I2)
#   CH8 (S2)  â€“ unassigned           (S2 knob scales front travel via expoData I3)
#
# 4WS MODE SELECTION (FL1/FL2 two-position switches)
#   FL1=off FL2=off â†’ Normal    (both axles counter-steer, 75% travel)
#   FL1=on  FL2=off â†’ Front-Only (rear locked center) â† L1
#   FL1=off FL2=on  â†’ Rear-Only  (front locked center) â† L2
#   FL1=on  FL2=on  â†’ Crab       (both steer same direction) â† L3
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
