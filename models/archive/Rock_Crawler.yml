  # â”€â”€ CH4: 2-Speed Transmission (SB momentary) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # Default: low gear (-100)
  - destCh: 3
    srcRaw: MAX
