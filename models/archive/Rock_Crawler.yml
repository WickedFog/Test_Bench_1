# LOGICAL SWITCHES
#   L1 â€“ Front-Only mode  (FL1=on,  FL2=off)
#   L2 â€“ Rear-Only mode   (FL1=off, FL2=on)
#   L3 â€“ Crab mode        (FL1=on,  FL2=on)
#   Normal mode requires no LS; active when L1/L2/L3 are all false.
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
