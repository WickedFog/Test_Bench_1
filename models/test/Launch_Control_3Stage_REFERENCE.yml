# ROOSTX REFERENCE: Launch Control with 3-Stage Throttle
# Verified working: Session 13
#
# WHAT THIS PROVES:
#   - SD2,SD2 self-toggle works in Companion 2.11.4 YAML
#   - SC2 as andsw gate works correctly
#   - FUNC_STICKY chain for staged launch works
#   - REPL mix stack order: stages first, transbrake kill second, master kill last
#   - andsw: "!SC2" on launch latch prevents 100% gap on SC release
#   - OVERRIDE_CHANNEL def: "1,0,1" works correctly gated by !L1
#   - RGB_LED def: "red,1,On" / "green,1,On" correct format
#
# KEY NOTATIONS (2.11.4 Companion YAML):
#   SD2,SD2     = SD self-toggle (arm/disarm)
#   SC2         = SC held (momentary pressed state as andsw gate)
#   !SC2        = SC released
#   I1          = Throttle input source in def field
#   L1..L6     = Logical switch references
#
# LOGIC CHAIN:
#   L1 = FUNC_STICKY SD2,SD2          -- Master safety toggle
#   L2 = FUNC_VPOS I1>5 andsw:SC2    -- Throttle up while SC held
#   L3 = FUNC_STICKY L2,SD2           -- Was staged latch
#   L4 = FUNC_STICKY L3,SD2 andsw:!SC2 -- Launch latch (opens on SC release, no gap)
#   L5 = FUNC_STICKY L4,SD2 delay:5  -- Stage2 (0.5s after launch)
#   L6 = FUNC_STICKY L5,SD2 delay:3  -- Stage3 (0.3s after Stage2)
#
# MIX STACK ORDER (CH2) - ORDER MATTERS:
#   1. TH base ADD (always active)
#   2. Stage1 50% REPL swtch:L4
#   3. Stage2 75% REPL swtch:L5
#   4. Stage3 100% REPL swtch:L6
#   5. Transbrake 0% REPL swtch:SC2  <- must be AFTER stages
#   6. Master kill 0% REPL swtch:!L1 <- must be LAST
#
# TEST SEQUENCE:
#   1. Press SD -> L1 armed
#   2. Hold SC + pull throttle -> L2 fires, L3 latches, CH2=0 (transbrake)
#   3. Release SC -> L4 opens immediately, CH2 ramps to 50%
#   4. 0.5s -> L5 fires, CH2 ramps to 75%
#   5. 0.3s -> L6 fires, CH2 follows throttle 100%
#   6. Press SD -> resets everything
#
# CONFIRMED BROKEN (do not use):
#   SD,SD (without "2") = does nothing in 2.11.4
#   SC,SC self-toggle   = does nothing (momentary too fast)
#   REPL kill before stage mixes = stages override kill
#   No andsw on launch latch = 100% throttle spike on SC release

