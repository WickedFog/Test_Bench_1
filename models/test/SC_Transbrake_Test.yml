semver: 2.11.4
header:
  name: SC Transbrake Test
  bitmap: ''
  labels: ''
noGlobalFunctions: 0
thrTrim: 0
trimInc: 0
displayTrims: 0
ignoreSensorIds: 0
showInstanceIds: 0
disableThrottleWarning: 1
enableCustomThrottleWarning: 0
customThrottleWarningPosition: 0
beepANACenter: 0
extendedLimits: 0
extendedTrims: 0
throttleReversed: 0
checklistInteractive: 0
flightModeData:
  0:
    name: ''
    fadeIn: 0
    fadeOut: 0
mixData:
# CH1 -- Steering passthrough
- destCh: 0
  srcRaw: ST
  weight: 100
  swtch: NONE
  curve:
    type: 0
    value: 0
  delayPrec: 0
  delayUp: 0
  delayDown: 0
  speedPrec: 0
  speedUp: 0
  speedDown: 0
  carryTrim: 0
  mltpx: ADD
  mixWarn: 0
  flightModes: '000000000'
  offset: 0
  name: Steering
# CH2 -- Throttle base (ADD first, always active)
- destCh: 1
  srcRaw: TH
  weight: 100
  swtch: NONE
  curve:
    type: 0
    value: 0
  delayPrec: 0
  delayUp: 0
  delayDown: 0
  speedPrec: 0
  speedUp: 0
  speedDown: 0
  carryTrim: 0
  mltpx: ADD
  mixWarn: 0
  flightModes: '000000000'
  offset: 0
  name: TH base
# CH2 -- Transbrake kill: REPL when L2 active (SC toggled ON)
#   Zeroes throttle while transbrake is engaged
- destCh: 1
  srcRaw: MAX
  weight: 0
  swtch: L2
  curve:
    type: 0
    value: 0
  delayPrec: 0
  delayUp: 0
  delayDown: 0
  speedPrec: 0
  speedUp: 0
  speedDown: 0
  carryTrim: 0
  mltpx: REPL
  mixWarn: 0
  flightModes: '000000000'
  offset: 0
  name: Transbrake
# CH2 -- Master safety kill: REPL LAST when !L1 (SD disarmed)
- destCh: 1
  srcRaw: MAX
  weight: 0
  swtch: '!L1'
  curve:
    type: 0
    value: 0
  delayPrec: 0
  delayUp: 0
  delayDown: 0
  speedPrec: 0
  speedUp: 0
  speedDown: 0
  carryTrim: 0
  mltpx: REPL
  mixWarn: 0
  flightModes: '000000000'
  offset: 0
  name: Kill !L1
expoData:
- srcRaw: ST
  scale: 0
  mode: 3
  chn: 0
  swtch: NONE
  flightModes: '000000000'
  weight: 100
  offset: 0
  curve:
    type: 1
    value: 0
  trimSource: 0
  name: ''
- srcRaw: TH
  scale: 0
  mode: 3
  chn: 1
  swtch: NONE
  flightModes: '000000000'
  weight: 100
  offset: 0
  curve:
    type: 1
    value: 0
  trimSource: 0
  name: ''
inputNames:
  0:
    val: St
  1:
    val: TH
# LOGICAL SWITCHES
# L1 -- SD self-toggle: master safety arm/disarm
# L2 -- SC self-toggle: transbrake engage/release
logicalSw:
  0:
    func: FUNC_STICKY
    def: SD,SD
    delay: 0
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
  1:
    func: FUNC_STICKY
    def: SC,SC
    delay: 0
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
# CUSTOM FUNCTIONS
# CF0 -- Red LED: disarmed
# CF1 -- Green LED: armed
customFn:
- swtch: '!L1'
  func: RGB_LED
  def: red,0
- swtch: L1
  func: RGB_LED
  def: green,0
thrTraceSrc: TH
switchWarning: {}
thrTrimSw: 0
potsWarnMode: WARN_OFF
potsWarnEnabled: 0
jitterFilter: GLOBAL
displayChecklist: 0
telemetryProtocol: 0
varioData:
  source: none
  centerSilent: 0
  centerMax: 0
  centerMin: 0
  min: 0
  max: 0
rssiSource: none
rfAlarms:
  warning: 45
  critical: 42
disableTelemetryWarning: 0
trainerData:
  mode: 'OFF'
  channelsStart: 0
  channelsCount: -8
  frameLength: 0
  delay: 0
  pulsePol: 0
modelRegistrationID: MT12
hatsMode: GLOBAL
usbJoystickExtMode: 0
usbJoystickIfMode: JOYSTICK
usbJoystickCircularCut: 0
radioGFDisabled: GLOBAL
radioTrainerDisabled: GLOBAL
modelHeliDisabled: GLOBAL
modelFMDisabled: GLOBAL
modelCurvesDisabled: GLOBAL
modelGVDisabled: GLOBAL
modelLSDisabled: GLOBAL
modelSFDisabled: GLOBAL
modelCustomScriptsDisabled: GLOBAL
modelTelemetryDisabled: GLOBAL
