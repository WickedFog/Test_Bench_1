logicalSw:
  # L1 -- Master safety: SD press=arm, SD press=disarm
  0:
    func: FUNC_STICKY
    def: SD2,SD2
    delay: 0
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
  # L2 -- Transbrake detect: throttle > 0.5% while SC held
  1:
    func: FUNC_VPOS
    def: I1,5
    delay: 0
    duration: 0
    andsw: SC2
    lsPersist: 0
    lsState: 0
  # L3 -- Was staged: latches when L2 fires. Only SD clears it.
  2:
    func: FUNC_STICKY
    def: L2,SD2
    delay: 0
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
  # L4 -- Launch latch: latches from L3, gated by !SC2
  #   Rising edge of L3 sets the latch while SC is held.
  #   andsw !SC2 masks output while SC held.
  #   The instant SC releases, output goes TRUE — no gap.
  #   Stage1 50% cap kicks in immediately on release.
  3:
    func: FUNC_STICKY
    def: L3,SD2
    delay: 0
    duration: 0
    andsw: "!SC2"
    lsPersist: 0
    lsState: 0
  # L5 -- Stage 2: fires 0.5s after L4
  4:
    func: FUNC_STICKY
    def: L4,SD2
    delay: 5
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
  # L6 -- Stage 3: fires 0.3s after L5 — full throttle follow
  5:
    func: FUNC_STICKY
    def: L5,SD2
    delay: 3
    duration: 0
    andsw: NONE
    lsPersist: 0
    lsState: 0
